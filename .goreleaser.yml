version: 2
# This is an example .goreleaser.yml file with some sane defaults.
# Make sure to check the documentation at http://goreleaser.com
before:
  hooks:
    - ls -rtlh
    - ls -rtlh api/internal/ui/dist
    - go mod download -x
builds:
  - id: clickvisual
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    binary: clickvisual
    ldflags:
      - -s -w -extldflags -static -X github.com/gotomicro/ego/core/eapp.appName={{.ProjectName}} -X github.com/gotomicro/ego/core/eapp.buildAppVersion={{.Version}} -X github.com/gotomicro/ego/core/eapp.buildTime={{.Date}}
archives:
  - id: clickvisual
    ids:
      - clickvisual
    name_template: "clickvisual-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    files:
      - LICENSE
      - src: scripts/migration/*
        dst: scripts/migration
        strip_parent: true
      - docker-compose.yml
      - src: config/*
        dst: config
        strip_parent: true
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ .Tag }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
